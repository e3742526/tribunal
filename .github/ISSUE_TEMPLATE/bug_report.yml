name: Bug report
description: Report a defect in Tribunal behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact command, config, and steps to reproduce
      placeholder: |
        1. Run `tribunal ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, adapter CLIs, and relevant auth/config state
      placeholder: |
        OS:
        Go:
        tribunal:
        codex:
        claude:
        agy:
