name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Go checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          test -z "$unformatted"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...
