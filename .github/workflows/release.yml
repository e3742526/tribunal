name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Go checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          test -z "$unformatted"

      - name: Check Go file line limit
        run: scripts/check-go-file-lines.sh

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

  goreleaser:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  archive-smoke:
    name: Verify archive (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Download matching release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${GITHUB_REF_NAME}" --pattern "tagteam_*_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"

      - name: Extract and verify installation
        shell: bash
        run: |
          archive="$(find . -maxdepth 1 -name 'tagteam_*.tar.gz' -print -quit)"
          test -n "$archive"
          mkdir extracted
          tar -xzf "$archive" -C extracted
          ./extracted/tagteam verify-install
