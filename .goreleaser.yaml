version: 2

project_name: tagteam

before:
  hooks:
    - sh -c 'test -z "$(gofmt -l .)"'
    - scripts/check-go-file-lines.sh
    - go test ./...
    - go vet ./...

builds:
  - id: tagteam
    main: .
    binary: tagteam
    env:
      - CGO_ENABLED=0
    ldflags:
      - >-
        -s -w
        -X github.com/cephalopod-ai/tagteam/internal/cli.Version={{ .Version }}
        -X github.com/cephalopod-ai/tagteam/internal/cli.CommitSHA={{ .FullCommit }}
        -X github.com/cephalopod-ai/tagteam/internal/cli.BuildTime={{ .Date }}
        -X github.com/cephalopod-ai/tagteam/internal/cli.Dirty=false
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - scripts/write-binary-manifest.sh "{{ .Path }}"

archives:
  - id: default
    ids:
      - tagteam
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - src: dist/tagteam_{{ .Os }}_{{ .Arch }}*/tagteam.sha256
        strip_parent: true
      - README.md
      - LICENSE
      - AGENTS.md
      - CONTRIBUTING.md
      - SECURITY.md
      - CODE_OF_CONDUCT.md

checksum:
  name_template: checksums.txt

sboms:
  - id: archives
    artifacts: archive
    disable: false

signs:
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: checksum
  - id: sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes
    artifacts: sbom

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
