version: 2
project_name: tribunal

before:
  hooks:
    - scripts/check.sh

builds:
  - id: tribunal
    main: .
    binary: tribunal
    env: [CGO_ENABLED=0]
    ldflags:
      - >-
        -s -w
        -X github.com/e3742526/tribunal/internal/cli.Version={{ .Version }}
        -X github.com/e3742526/tribunal/internal/cli.CommitSHA={{ .FullCommit }}
        -X github.com/e3742526/tribunal/internal/cli.BuildTime={{ .Date }}
        -X github.com/e3742526/tribunal/internal/cli.Dirty=false
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    hooks:
      post:
        - scripts/write-binary-manifest.sh "{{ .Path }}"

archives:
  - ids: [tribunal]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: dist/tribunal_{{ .Os }}_{{ .Arch }}*/tribunal.sha256
        strip_parent: true
      - README.md
      - LICENSE
      - AGENTS.md
      - CONTRIBUTING.md
      - SECURITY.md
      - CODE_OF_CONDUCT.md

checksum:
  name_template: checksums.txt
sboms:
  - id: archives
    artifacts: archive
signs:
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args: [sign-blob, "--bundle=${signature}", "${artifact}", --yes]
    artifacts: checksum
  - id: sboms
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args: [sign-blob, "--bundle=${signature}", "${artifact}", --yes]
    artifacts: sbom
changelog:
  use: git
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^chore:"]
